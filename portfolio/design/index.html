<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <title>设计作品集 | Hu Xinjie</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/main-style.css">
    <link rel="stylesheet" href="../../assets/css/sub-style.css">
    <!-- Widget Profile Component -->
    <script src="../../assets/components/widget-profile.js"></script>
</head>

<body data-auto-load-widget-profile data-base-path="../../"
    data-component-path="../../assets/components/widget-profile.html">
    <!-- 移动端菜单按钮 -->
    <button class="mobile-menu-btn" onclick="toggleSidebar()">
        <i class="fas fa-bars"></i>
    </button>

    <!-- Sidebar Component Container -->
    <div id="widget-profile-container"></div>

    <!-- Back Button -->
    <a href="../../index.html#portfolio" class="back-button">
        <i class="fas fa-arrow-left"></i>
    </a>

    <!-- Main Content -->
    <div class="main-content">
        <div class="design-gallery-container">
            <!-- Design Group -->
            <div class="design-group" id="design-section">
                <div class="design-group-title">Design</div>
                <div class="design-grid" id="design-grid"></div>
            </div>

            <!-- Photography Group -->
            <div class="design-group" id="photo-section">
                <div class="design-group-title">Photography</div>
                <div class="photo-grid" id="photo-grid"></div>
            </div>
        </div>
    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <span class="lightbox-close" id="lightbox-close">&times;</span>
        <img class="lightbox-img" id="lightbox-img" src="" alt="作品大图">
    </div>

    <script>
        function gen(prefix, count, pad = 2) {
            return Array.from({ length: count }, (_, i) => ({
                file: `${prefix}${pad ? String(i + 1).padStart(pad, '0') : i + 1}.jpg`
            }));
        }

        const works = {
            design: { folder: 'design', items: [...gen('poster', 3, 0), ...gen('design_', 3)] },
            photo: { folder: 'photo', items: gen('photo_', 11) }
        };

        const designGrid = document.getElementById('design-grid');
        works.design.items.forEach(w => createDesignItem(designGrid, works.design.folder, w, 'design-item'));

        const photoGrid = document.getElementById('photo-grid');
        works.photo.items.forEach(w => createPhotoItem(photoGrid, works.photo.folder, w, 'photo-item'));

        function createDesignItem(grid, folder, work, itemClass) {
            const imgPath = `${folder}/${work.file}`;
            const div = document.createElement('div');
            div.className = itemClass;
            div.innerHTML = `
                <div class="design-img-container">
                    <img class="design-img" src="${imgPath}" alt="${work.file}" onerror="this.closest('.design-item').style.display='none'">
                </div>
            `;
            div.onclick = function () {
                document.getElementById('lightbox-img').src = imgPath;
                document.getElementById('lightbox').classList.add('active');
            };
            grid.appendChild(div);
        }

        function createPhotoItem(grid, folder, work, itemClass) {
            const imgPath = `${folder}/${work.file}`;
            const div = document.createElement('div');
            div.className = itemClass;
            div.innerHTML = `
                <div class="photo-img-container">
                    <img class="photo-img" src="${imgPath}" alt="${work.file}" onerror="this.closest('.photo-item').style.display='none'">
                </div>
            `;
            div.onclick = function () {
                document.getElementById('lightbox-img').src = imgPath;
                document.getElementById('lightbox').classList.add('active');
            };
            grid.appendChild(div);
        }

        // Lightbox关闭
        document.getElementById('lightbox-close').onclick = function () {
            document.getElementById('lightbox').classList.remove('active');
        };
        document.getElementById('lightbox').onclick = function (e) {
            if (e.target === this) this.classList.remove('active');
        };

        // 移动端侧边栏控制
        function toggleSidebar() {
            const sidebar = document.querySelector('.widget-profile');
            sidebar.classList.toggle('open');
        }

        // 点击主内容区时关闭侧边栏（移动端）
        document.querySelector('.main-content').addEventListener('click', function () {
            if (window.innerWidth <= 1024) {
                document.querySelector('.widget-profile').classList.remove('open');
            }
        });

        // 窗口大小改变时的处理
        window.addEventListener('resize', function () {
            if (window.innerWidth > 1024) {
                document.querySelector('.widget-profile').classList.remove('open');
            }
        });
    </script>
</body>

</html>
