<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="UTF-8">
    <title>设计作品集 | Hu Xinjie</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../assets/css/main-style.css">
    <link rel="stylesheet" href="../../assets/css/sub-style.css">
    <!-- Widget Profile Component -->
    <script src="../../assets/components/widget-profile.js"></script>
</head>

<body data-auto-load-widget-profile data-base-path="../../"
    data-component-path="../../assets/components/widget-profile.html">
    <!-- 移动端菜单按钮 -->
    <button class="mobile-menu-btn" onclick="toggleSidebar()">
        <i class="fas fa-bars"></i>
    </button>

    <!-- Sidebar Component Container -->
    <div id="widget-profile-container"></div>

    <!-- Back Button -->
    <a href="../../index.html#portfolio" class="back-button">
        <i class="fas fa-arrow-left"></i>
    </a>

    <!-- Main Content -->
    <div class="main-content">
        <div class="design-gallery-container">
            <!-- Design Group -->
            <div class="design-group" id="design-section">
                <div class="design-group-title">Design</div>
                <div class="design-grid" id="design-grid"></div>
            </div>

            <!-- Photography Group -->
            <div class="design-group" id="photo-section">
                <div class="design-group-title">Photography</div>
                <div class="photo-grid" id="photo-grid"></div>
            </div>
        </div>
    </div>

    <!-- Lightbox -->
    <div class="lightbox" id="lightbox">
        <span class="lightbox-close" id="lightbox-close">&times;</span>
        <img class="lightbox-img" id="lightbox-img" src="" alt="作品大图">
    </div>

    <style>
        .design-item-group {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            background: #fafbfc;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(59, 89, 152, 0.08);
            overflow: hidden;
            padding: 12px;
        }

        .design-item-group .mini-item {
            cursor: pointer;
            border-radius: 8px;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .design-item-group .mini-item:hover {
            transform: scale(1.03);
        }

        .design-item-group .mini-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
    </style>
    <script>
        const designItems = [
            { file: 'poster1.jpg' },
            { file: 'poster2.jpg' },
            { file: 'poster3.jpg' },
            { file: 'product_01.png' },
            { file: 'product_02.png' },
            { group: ['design_02.jpg', 'design_03.jpg'] }
        ];

        const photoItems = [
            'photo_01.jpg', 'photo_02.jpg', 'photo_03.jpg',
            'photo_05.jpg', 'photo_06.jpg', 'photo_07.jpg',
            'photo_08.jpg', 'photo_09.jpg', 'photo_10.jpg', 'photo_11.jpg'
        ].map(f => ({ file: f }));

        const designGrid = document.getElementById('design-grid');
        designItems.forEach(item => {
            if (item.group) {
                createGroupItem(designGrid, 'design', item.group);
            } else {
                createDesignItem(designGrid, 'design', item);
            }
        });

        const photoGrid = document.getElementById('photo-grid');
        photoItems.forEach(w => createPhotoItem(photoGrid, 'photo', w, 'photo-item'));

        function openLightbox(src) {
            document.getElementById('lightbox-img').src = src;
            document.getElementById('lightbox').classList.add('active');
        }

        function createDesignItem(grid, folder, work) {
            const imgPath = `${folder}/${work.file}`;
            const div = document.createElement('div');
            div.className = 'design-item';
            div.innerHTML = `
                <div class="design-img-container">
                    <img class="design-img" src="${imgPath}" alt="${work.file}" onerror="this.closest('.design-item').style.display='none'">
                </div>
            `;
            div.onclick = function () { openLightbox(imgPath); };
            grid.appendChild(div);
        }

        function createGroupItem(grid, folder, files) {
            const div = document.createElement('div');
            div.className = 'design-item-group';
            files.forEach(f => {
                const imgPath = `${folder}/${f}`;
                const mini = document.createElement('div');
                mini.className = 'mini-item';
                mini.innerHTML = `<img src="${imgPath}" alt="${f}">`;
                mini.onclick = function () { openLightbox(imgPath); };
                div.appendChild(mini);
            });
            grid.appendChild(div);
        }

        function createPhotoItem(grid, folder, work, itemClass) {
            const imgPath = `${folder}/${work.file}`;
            const div = document.createElement('div');
            div.className = itemClass;
            div.innerHTML = `
                <div class="photo-img-container">
                    <img class="photo-img" src="${imgPath}" alt="${work.file}" onerror="this.closest('.photo-item').style.display='none'">
                </div>
            `;
            div.onclick = function () {
                document.getElementById('lightbox-img').src = imgPath;
                document.getElementById('lightbox').classList.add('active');
            };
            grid.appendChild(div);
        }

        // Lightbox关闭
        document.getElementById('lightbox-close').onclick = function () {
            document.getElementById('lightbox').classList.remove('active');
        };
        document.getElementById('lightbox').onclick = function (e) {
            if (e.target === this) this.classList.remove('active');
        };

        // 移动端侧边栏控制
        function toggleSidebar() {
            const sidebar = document.querySelector('.widget-profile');
            sidebar.classList.toggle('open');
        }

        // 点击主内容区时关闭侧边栏（移动端）
        document.querySelector('.main-content').addEventListener('click', function () {
            if (window.innerWidth <= 1024) {
                document.querySelector('.widget-profile').classList.remove('open');
            }
        });

        // 窗口大小改变时的处理
        window.addEventListener('resize', function () {
            if (window.innerWidth > 1024) {
                document.querySelector('.widget-profile').classList.remove('open');
            }
        });
    </script>
</body>

</html>
